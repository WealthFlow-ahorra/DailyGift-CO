<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>🌸 Regalo Mágico · Agita & Rasca (Secreto) 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --rosa: #FF69B4;
            --dorado: #FFD700;
            --morado: #2d1b36;
            --vino: #1a0a1a;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #0f0715;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: linear-gradient(145deg, #0f0715 0%, #1e1028 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 40%, rgba(255,105,180,0.12) 0%, transparent 70%),
                        radial-gradient(circle at 80% 60%, rgba(255,215,0,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            max-width: 1100px;
            width: 100%;
            height: 100%;
            max-height: 100vh;
            background: rgba(20, 8, 25, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,105,180,0.3);
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(1.2rem, 6vw, 1.9rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FF69B4, #FFB6C1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,105,180,0.5);
            animation: titleGlow 2s infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,105,180,0.3)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,215,0,0.5)); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            margin: 0.5rem 0;
            gap: 8px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,105,180,0.4);
            flex-shrink: 0;
        }

        .progress {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-weight: bold;
            color: #1a0a1a;
            font-size: 0.85rem;
            box-shadow: 0 0 10px rgba(255,105,180,0.5);
        }

        .daily {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #FFE4F0;
            font-weight: 600;
        }

        .reset-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #FFB6C1;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.75rem;
            color: #FFE4F0;
            cursor: pointer;
            transition: 0.1s linear;
        }
        .reset-btn:active { transform: scale(0.96); background: #FF69B4; color: #1a0a1a; }

        .cards-scroll-area {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            margin: 0.5rem 0;
            padding: 0 4px;
        }

        .cards-scroll-area::-webkit-scrollbar {
            width: 5px;
        }
        .cards-scroll-area::-webkit-scrollbar-thumb {
            background: #FF69B4;
            border-radius: 10px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 0.7rem;
            padding-bottom: 0.5rem;
        }

        .card-container {
            aspect-ratio: 3 / 4;
            perspective: 800px;
            cursor: pointer;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 1rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }

        .card.flipping {
            animation: flipCelebration 1.4s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes flipCelebration {
            0% { transform: rotateY(0deg); box-shadow: 0 0 0 2px rgba(255,215,0,0.8); }
            30% { transform: rotateY(90deg); box-shadow: 0 0 20px 8px rgba(255,215,0,0.9); }
            60% { transform: rotateY(180deg); box-shadow: 0 0 30px 12px #FF69B4; }
            100% { transform: rotateY(180deg); box-shadow: 0 6px 14px rgba(0,0,0,0.3); }
        }

        .card.flipped-permanent {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(145deg, #2d1b36, #1a0a1a);
            border: 2px solid #FF69B4;
            box-shadow: inset 0 0 20px rgba(255,20,147,0.3);
        }

        .card-back-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px #FF69B4);
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.12); opacity: 1; text-shadow: 0 0 10px #FF69B4; }
        }

        .card-front {
            background: linear-gradient(145deg, #FFF0F8, #FFE0F0);
            transform: rotateY(180deg);
            border: 1px solid #FFD700;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.9rem;
        }

        .card-text {
            font-size: clamp(0.65rem, 3vw, 0.85rem);
            font-weight: 800;
            text-align: center;
            color: #4a0a2a;
            background: rgba(255,240,248,0.95);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            word-break: break-word;
            border-radius: 0.9rem;
        }

        .footer-area {
            flex-shrink: 0;
            margin-top: 0.3rem;
        }

        .msg-area {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 0.7rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #FFE4F0;
            border: 1px solid rgba(255,105,180,0.4);
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 0.4rem;
            opacity: 0.7;
            color: #FFE4F0;
        }

        /* Modal */
        .modal-full {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(25px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: linear-gradient(145deg, #2d1b36, #1a0a1a);
            max-width: 85vw;
            max-height: 80vh;
            border-radius: 2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #FFD700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 40px rgba(255,105,180,0.5);
            animation: modalMagic 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes modalMagic {
            from { transform: scale(0.7) rotate(-5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .modal-img {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            border-radius: 1rem;
        }

        .modal-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFF0F5;
            padding: 1rem;
            text-align: center;
        }

        .close-modal {
            margin-top: 0.8rem;
            background: linear-gradient(135deg, #FF69B4, #FFD700);
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #1a0a1a;
            font-size: 1rem;
            cursor: pointer;
        }
        .close-modal:active { transform: scale(0.96); }

        /* Minijuegos overlay */
        .minigame-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20,8,25,0.95);
            backdrop-filter: blur(20px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .minigame-card {
            background: linear-gradient(145deg, #2d1b36, #1a0a1a);
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            padding: 1.8rem 1.2rem;
            border: 3px solid #FFD700;
            box-shadow: 0 0 40px #FF69B4;
            text-align: center;
            color: #FFE4F0;
        }

        .minigame-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FFD700, #FF69B4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .shake-bar-container {
            background: #1a0a1a;
            height: 30px;
            border-radius: 40px;
            margin: 20px 0;
            border: 2px solid #FF69B4;
            overflow: hidden;
        }

        .shake-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FF69B4);
            transition: width 0.05s linear;
            box-shadow: 0 0 15px #FF69B4;
        }

        .scratch-canvas-container {
            margin: 15px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 0 3px #FFD700;
        }

        #scratchCanvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            background: #2d1b36;
            touch-action: none;
        }

        .timer-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD700;
            margin: 8px 0;
        }

        .btn-minigame {
            background: linear-gradient(135deg, #FF69B4, #FFD700);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #1a0a1a;
            font-size: 1.1rem;
            margin-top: 10px;
            cursor: pointer;
            border: 1px solid white;
        }
        .btn-minigame.cancel {
            background: #3a2a3a;
            color: #FFE4F0;
            margin-left: 10px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #FF69B4;
            pointer-events: none;
            z-index: 3000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 650px) {
            body { padding: 6px; }
            .game-container { padding: 0.8rem; border-radius: 1.5rem; }
            .cards-grid { grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="title">✨ Agita & Rasca · Misterio ✨</div>
    </div>
    <div class="stats">
        <div class="progress">🎀 <span id="progressCount">0</span>/<span id="totalCardsSpan">20</span></div>
        <div class="daily">💖 <span id="dailyMsg">✨ 1 carta disponible ✨</span></div>
        <button id="resetGameBtn" class="reset-btn">🔄 Reiniciar</button>
    </div>
    <div class="cards-scroll-area" id="scrollArea">
        <div class="cards-grid" id="cardsGrid"></div>
    </div>
    <div class="footer-area">
        <div class="msg-area" id="globalMsg">💗 Toca una carta… algunas esconden retos secretos 💗</div>
        <footer>💌 Con todo mi amor, <span id="nombreNovioFooter">Yeffer Hurtado</span> 💌</footer>
    </div>
</div>

<!-- Modal contenido -->
<div id="fullModal" class="modal-full">
    <div class="modal-card">
        <div id="modalContent"></div>
        <button class="close-modal" id="closeModalBtn">Cerrar</button>
    </div>
</div>

<!-- Overlay minijuegos -->
<div id="minigameOverlay" class="minigame-overlay" style="display: none;"></div>

<script>
    (function(){
        "use strict";

        // CONFIGURACIÓN
        const CONFIG = {
            NOVIA: "Hellen",
            NOVIO: "Yeffer Hurtado",
            TOTAL_CARTAS: 20,
            NUM_ROMANTICAS: 8,
            NUM_PICANTES: 4,
            NUM_FOTOS: 8
        };

        // CONTENIDOS
        const ROMANTICAS = [
            { type:"text", value:`${CONFIG.NOVIA}, eres el amor de mi vida 💕` },
            { type:"text", value:"Vale por un masaje relajante de 30 min 💆‍♀️" },
            { type:"text", value:`Cada día te amo más, eres mi sol 🌞` },
            { type:"text", value:"Te amo hasta el infinito y más allá 💖" },
            { type:"text", value:"Pídeme la foto que quieras, hoy es tu día 📸" },
            { type:"text", value:"Tu sonrisa ilumina mi mundo ☀️" },
            { type:"text", value:"Esta noche elegimos juntos la película 🎬" },
            { type:"text", value:"Desayuno sorpresa en la cama 🥐" },
            { type:"text", value:"Gracias por existir, mi vida es mejor contigo 🌸" }
        ];
        const PICANTES = [
            { type:"text", value:"🔥 Quiero una foto tuya ahora mismo 🔥" },
            { type:"text", value:"💪 20 sentadillas en video para mí" },
            { type:"text", value:"👑 Hoy tú mandas en todo" },
            { type:"text", value:"💃 Te debo un baile privado" },
            { type:"text", value:"🏩 Próxima cita: tú eliges el lugar" },
            { type:"text", value:"🎤 Mándame un audio diciendo algo lindo" }
        ];
        const FOTOS = [
            { type:"image", value:"https://picsum.photos/400/600?random=201" },
            { type:"image", value:"https://picsum.photos/400/600?random=202" },
            { type:"image", value:"https://picsum.photos/400/600?random=203" },
            { type:"image", value:"https://picsum.photos/400/600?random=204" },
            { type:"image", value:"https://picsum.photos/400/600?random=205" },
            { type:"image", value:"https://picsum.photos/400/600?random=206" },
            { type:"image", value:"https://picsum.photos/400/600?random=207" },
            { type:"image", value:"https://picsum.photos/400/600?random=208" }
        ];

        // Estado global
        let currentCards = [], unlocked = [], lastDate = null;
        let specialMechanics = {};   // índice -> 'shake'/'scratch'
        let gameReady = false, isAnimating = false, activeMinigame = false;
        let cardElements = [];
        
        // Elementos DOM
        const grid = document.getElementById('cardsGrid');
        const progressSpan = document.getElementById('progressCount');
        const dailySpan = document.getElementById('dailyMsg');
        const globalMsg = document.getElementById('globalMsg');
        const modal = document.getElementById('fullModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const resetBtn = document.getElementById('resetGameBtn');
        const minigameOverlay = document.getElementById('minigameOverlay');
        const totalSpan = document.getElementById('totalCardsSpan');
        const footerName = document.getElementById('nombreNovioFooter');

        totalSpan.innerText = CONFIG.TOTAL_CARTAS;
        footerName.innerText = CONFIG.NOVIO;

        // Utilidades
        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        };
        const allUnlocked = () => unlocked.every(v => v === true);
        const canUnlock = () => lastDate !== getTodayStr() && !allUnlocked();

        // Sonidos simples
        const sounds = {
            ctx: null,
            init() { if(!this.ctx && window.AudioContext) this.ctx = new AudioContext(); },
            play(freqs, duration=0.3) {
                this.init(); if(!this.ctx) return;
                if(this.ctx.state === 'suspended') this.ctx.resume();
                try {
                    const now = this.ctx.currentTime;
                    freqs.forEach((freq, i) => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.connect(gain); gain.connect(this.ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.08, now + i*0.05);
                        gain.gain.exponentialRampToValueAtTime(0.0001, now + i*0.05 + duration);
                        osc.start(now + i*0.05);
                        osc.stop(now + i*0.05 + duration);
                    });
                } catch(e) {}
            },
            sparkle() { this.play([880, 1046.5, 1318.52]); },
            unlock() { this.play([523.25, 659.25, 783.99, 1046.5]); }
        };

        // Confeti
        function createConfetti() {
            for(let i=0; i<40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + '%';
                conf.style.background = ['#FF69B4','#FFD700','#FFB6C1'][Math.floor(Math.random()*3)];
                conf.style.width = Math.random() * 8 + 4 + 'px';
                conf.style.height = conf.style.width;
                conf.style.animationDuration = Math.random() * 1.5 + 1 + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 2500);
            }
        }

        // Barajar y construir mazo
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function buildDeck() {
            let deck = [];
            let rom = shuffle([...ROMANTICAS]).slice(0, CONFIG.NUM_ROMANTICAS);
            let pic = shuffle([...PICANTES]).slice(0, CONFIG.NUM_PICANTES);
            let fot = shuffle([...FOTOS]).slice(0, CONFIG.NUM_FOTOS);
            deck.push(...rom, ...pic, ...fot);
            while(deck.length < CONFIG.TOTAL_CARTAS) deck.push({ type:"text", value:`Te amo ${CONFIG.NOVIA} 💖` });
            deck = shuffle(deck).slice(0, CONFIG.TOTAL_CARTAS);
            
            // Asignar mecánicas secretas (6 cartas especiales)
            let specialIndices = new Set();
            while(specialIndices.size < 6) specialIndices.add(Math.floor(Math.random() * CONFIG.TOTAL_CARTAS));
            const mechanics = ['shake', 'scratch', 'shake', 'scratch', 'shake', 'scratch'];
            let mechMap = {};
            [...specialIndices].forEach((idx, i) => mechMap[idx] = mechanics[i]);
            return { deck, specialMechanics: mechMap };
        }

        // Persistencia
        function saveGame() {
            const data = {
                deck: currentCards,
                unlocked,
                lastDate,
                special: specialMechanics
            };
            localStorage.setItem('loveGame_v12', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('loveGame_v12');
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    currentCards = data.deck;
                    unlocked = data.unlocked;
                    lastDate = data.lastDate;
                    specialMechanics = data.special || {};
                    if(currentCards.length === CONFIG.TOTAL_CARTAS) return;
                } catch(e) {}
            }
            const { deck, specialMechanics: mechMap } = buildDeck();
            currentCards = deck;
            specialMechanics = mechMap;
            unlocked = new Array(CONFIG.TOTAL_CARTAS).fill(false);
            lastDate = null;
            saveGame();
        }

        // UI de cartas
        function updateCardFrontElement(index) {
            const cardDiv = cardElements[index];
            const front = cardDiv.querySelector('.card-front');
            front.innerHTML = '';
            const data = currentCards[index];
            if(data.type === 'image') {
                const img = document.createElement('img');
                img.src = data.value;
                front.appendChild(img);
            } else {
                const txt = document.createElement('div');
                txt.className = 'card-text';
                txt.innerText = data.value;
                front.appendChild(txt);
            }
        }

        function rebuildUI() {
            grid.innerHTML = '';
            cardElements = [];
            for(let i=0; i<CONFIG.TOTAL_CARTAS; i++) {
                const container = document.createElement('div');
                container.className = 'card-container';
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card' + (unlocked[i] ? ' flipped-permanent' : '');
                
                const front = document.createElement('div');
                front.className = 'card-front';
                const back = document.createElement('div');
                back.className = 'card-back';
                back.innerHTML = '<span class="card-back-icon">💖</span>';
                
                if(unlocked[i]) {
                    updateCardFrontElement(i);
                } else {
                    front.innerHTML = '<span class="card-back-icon">💖</span>';
                }
                
                cardDiv.appendChild(front);
                cardDiv.appendChild(back);
                container.appendChild(cardDiv);
                container.addEventListener('click', () => onCardClick(i));
                grid.appendChild(container);
                cardElements.push(cardDiv);
            }
            updateProgress();
        }

        function updateProgress() {
            const count = unlocked.filter(v=>v).length;
            progressSpan.innerText = count;
            if(allUnlocked()) dailySpan.innerText = "🏆 COMPLETADO";
            else if(lastDate === getTodayStr()) dailySpan.innerText = "⏳ Carta usada hoy";
            else dailySpan.innerText = "✨ 1 carta disponible ✨";
        }

        // Flujo principal al tocar carta
        async function onCardClick(index) {
            if(!gameReady || isAnimating || activeMinigame) return;
            if(unlocked[index]) { showModal(index); return; }
            if(allUnlocked()) { globalMsg.innerText = "🌟 ¡Ya descubriste todas las sorpresas! 🌟"; return; }
            if(!canUnlock()) { globalMsg.innerText = "⏳ Solo una carta por día. ¡Mañana más! 💫"; sounds.sparkle(); return; }

            const mechanic = specialMechanics[index];
            if(mechanic) {
                // Minijuego especial
                if(mechanic === 'shake') await startShakeGame(index);
                else if(mechanic === 'scratch') await startScratchGame(index);
                if(unlocked[index]) finalizeUnlock(index);
            } else {
                // Apertura normal
                await unlockNormal(index);
            }
        }

        async function unlockNormal(index) {
            isAnimating = true; activeMinigame = true;
            const cardDiv = cardElements[index];
            sounds.sparkle();
            cardDiv.classList.add('flipping');
            await new Promise(r => setTimeout(r, 1400));
            
            unlocked[index] = true; lastDate = getTodayStr(); saveGame();
            updateCardFrontElement(index);
            cardDiv.classList.remove('flipping');
            cardDiv.classList.add('flipped-permanent');
            
            finalizeUnlock(index);
            isAnimating = false; activeMinigame = false;
        }

        function finalizeUnlock(index) {
            createConfetti();
            sounds.unlock();
            updateProgress();
            globalMsg.innerHTML = `🎉✨ ¡CARTA DESBLOQUEADA! ✨🎉`;
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        // ========== SHAKE (agitar) ==========
        function startShakeGame(index) {
            return new Promise((resolve) => {
                activeMinigame = true; isAnimating = true;
                let shakePower = 0;
                const THRESHOLD = 100;
                let last = { x:0, y:0, z:0 };
                let frame = null;
                
                minigameOverlay.style.display = 'flex';
                minigameOverlay.innerHTML = `
                    <div class="minigame-card">
                        <div class="minigame-title">⚡ ¡AGITA! ⚡</div>
                        <p>Agita el celular rápido hasta llenar la barra</p>
                        <div class="shake-bar-container"><div id="shakeFill" class="shake-bar-fill" style="width:0%"></div></div>
                        <p id="shakeHint">¡Más rápido! 🔥</p>
                        <button class="btn-minigame cancel" id="cancelShake">Cancelar</button>
                    </div>
                `;
                const fill = document.getElementById('shakeFill');
                const hint = document.getElementById('shakeHint');
                
                const motionHandler = (e) => {
                    const acc = e.accelerationIncludingGravity;
                    if(!acc) return;
                    const { x, y, z } = acc;
                    const delta = Math.abs(x - last.x) + Math.abs(y - last.y) + Math.abs(z - last.z);
                    if(delta > 15) {
                        shakePower = Math.min(shakePower + delta * 0.8, THRESHOLD);
                        fill.style.width = (shakePower / THRESHOLD * 100) + '%';
                        if(shakePower >= THRESHOLD) {
                            hint.textContent = '🎉 ¡SORPRESA! 🎉';
                            cleanup();
                            complete();
                        }
                    }
                    last = { x, y, z };
                };

                const complete = () => {
                    minigameOverlay.style.display = 'none';
                    unlocked[index] = true; lastDate = getTodayStr(); saveGame();
                    updateCardFrontElement(index);
                    cardElements[index].classList.add('flipped-permanent');
                    activeMinigame = false; isAnimating = false;
                    resolve();
                };

                const cancel = () => {
                    cleanup();
                    minigameOverlay.style.display = 'none';
                    activeMinigame = false; isAnimating = false;
                    globalMsg.innerText = '😢 Intenta de nuevo cuando quieras';
                    resolve();
                };

                const cleanup = () => {
                    window.removeEventListener('devicemotion', motionHandler);
                    clearTimeout(fallbackTimer);
                };

                const fallbackTimer = setTimeout(() => {
                    if(shakePower < THRESHOLD) cancel();
                }, 15000);

                if(typeof DeviceMotionEvent?.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission().then(perm => {
                        if(perm === 'granted') window.addEventListener('devicemotion', motionHandler);
                        else cancel();
                    }).catch(cancel);
                } else {
                    window.addEventListener('devicemotion', motionHandler);
                }

                document.getElementById('cancelShake').onclick = cancel;
                minigameOverlay.onclick = (e) => { if(e.target === minigameOverlay) cancel(); };
            });
        }

        // ========== SCRATCH (raspar) ==========
        function startScratchGame(index) {
            return new Promise((resolve) => {
                activeMinigame = true; isAnimating = true;
                const cardData = currentCards[index];
                minigameOverlay.style.display = 'flex';
                minigameOverlay.innerHTML = `
                    <div class="minigame-card" style="max-width:450px">
                        <div class="minigame-title">✨ RASCA ✨</div>
                        <p>Talla con el dedo para descubrir</p>
                        <div class="scratch-canvas-container">
                            <canvas id="scratchCanvas" width="400" height="400"></canvas>
                        </div>
                        <div class="timer-text" id="scratchTimer">15s</div>
                        <button class="btn-minigame cancel" id="cancelScratch">Cancelar</button>
                    </div>
                `;
                const canvas = document.getElementById('scratchCanvas');
                const ctx = canvas.getContext('2d');
                const timerEl = document.getElementById('scratchTimer');
                let timeLeft = 15;
                let revealed = false;
                let drawing = false;

                const drawBaseContent = () => {
                    ctx.clearRect(0, 0, 400, 400);
                    ctx.fillStyle = '#FFF0F5';
                    ctx.fillRect(0, 0, 400, 400);
                    if(cardData.type === 'image') {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.src = cardData.value;
                        img.onload = () => {
                            ctx.drawImage(img, 0, 0, 400, 400);
                            drawCover();
                        };
                        img.onerror = () => {
                            ctx.font = 'bold 22px system-ui'; ctx.fillStyle = '#4a0a2a';
                            ctx.textAlign = 'center'; ctx.fillText('🌸 Imagen especial 🌸', 200, 200);
                            drawCover();
                        };
                    } else {
                        ctx.font = 'bold 22px system-ui'; ctx.fillStyle = '#4a0a2a';
                        ctx.textAlign = 'center'; ctx.fillText(cardData.value, 200, 200);
                        drawCover();
                    }
                };

                const drawCover = () => {
                    ctx.fillStyle = '#4a2e4a';
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 20px system-ui';
                    ctx.textAlign = 'center';
                    ctx.fillText('✨ RASCA AQUÍ ✨', 200, 200);
                    ctx.strokeStyle = '#FFB6C1';
                    ctx.lineWidth = 2;
                    for(let i=0; i<5; i++) {
                        ctx.beginPath();
                        ctx.arc(80 + i*60, 120, 20, 0, Math.PI*2);
                        ctx.stroke();
                    }
                };

                const scratch = (x, y) => {
                    ctx.save();
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(x, y, 28, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                    checkReveal();
                };

                const checkReveal = () => {
                    if(revealed) return;
                    const imgData = ctx.getImageData(0,0,400,400);
                    let transparent = 0;
                    for(let i=0; i<imgData.data.length; i+=4) if(imgData.data[i+3] < 200) transparent++;
                    if(transparent > 60000) {
                        revealed = true;
                        finish(true);
                    }
                };

                const finish = (success) => {
                    clearInterval(timer);
                    canvas.removeEventListener('touchmove', touchMove);
                    canvas.removeEventListener('touchstart', touchStart);
                    canvas.removeEventListener('mousemove', mouseMove);
                    canvas.removeEventListener('mousedown', mouseDown);
                    if(success) {
                        unlocked[index] = true; lastDate = getTodayStr(); saveGame();
                        updateCardFrontElement(index);
                        cardElements[index].classList.add('flipped-permanent');
                    }
                    minigameOverlay.style.display = 'none';
                    activeMinigame = false; isAnimating = false;
                    if(success) resolve();
                    else { globalMsg.innerText = '⏰ Tiempo agotado. Intenta otra vez'; resolve(); }
                };

                const getCoords = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scale = 400 / rect.width;
                    let cx, cy;
                    if(e.touches) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
                    else { cx = e.clientX; cy = e.clientY; }
                    return {
                        x: Math.min(400, Math.max(0, (cx - rect.left) * scale)),
                        y: Math.min(400, Math.max(0, (cy - rect.top) * scale))
                    };
                };

                const touchStart = (e) => { e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                const touchMove = (e) => { e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                const mouseDown = (e) => { e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                const mouseMove = (e) => { if(e.buttons !== 1) return; e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };

                drawBaseContent();
                
                canvas.addEventListener('touchstart', touchStart, {passive: false});
                canvas.addEventListener('touchmove', touchMove, {passive: false});
                canvas.addEventListener('mousedown', mouseDown);
                canvas.addEventListener('mousemove', mouseMove);
                
                const timer = setInterval(() => {
                    timeLeft--;
                    timerEl.textContent = timeLeft + 's';
                    if(timeLeft <= 0) finish(false);
                }, 1000);

                document.getElementById('cancelScratch').onclick = () => finish(false);
                minigameOverlay.onclick = (e) => { if(e.target === minigameOverlay) finish(false); };
            });
        }

        function showModal(idx) {
            const data = currentCards[idx];
            modalContent.innerHTML = '';
            if(data.type === 'image') {
                const img = document.createElement('img');
                img.className = 'modal-img';
                img.src = data.value;
                modalContent.appendChild(img);
            } else {
                const div = document.createElement('div');
                div.className = 'modal-text';
                div.innerText = data.value;
                modalContent.appendChild(div);
            }
            modal.style.display = 'flex';
            sounds.sparkle();
        }

        function closeModal() { modal.style.display = 'none'; }

        function resetGame() {
            if(isAnimating) return;
            const { deck, specialMechanics: mechMap } = buildDeck();
            currentCards = deck; specialMechanics = mechMap;
            unlocked = new Array(CONFIG.TOTAL_CARTAS).fill(false); lastDate = null;
            saveGame(); rebuildUI();
            globalMsg.innerText = "✨ Juego reiniciado. ¡Descubre las cartas secretas! ✨";
        }

        // Tutorial inicial
        async function startTutorial() {
            gameReady = false;
            const msg = (text) => new Promise(res => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);z-index:4000;display:flex;align-items:center;justify-content:center';
                const box = document.createElement('div');
                box.style.cssText = 'background:#2d1b36;padding:2rem;border-radius:2rem;border:3px solid #FFD700;max-width:320px;text-align:center';
                box.innerHTML = `<p style="color:#FFE4F0;margin-bottom:1rem;font-weight:bold">💖 ${text}</p><button style="background:#FF69B4;border:none;padding:0.6rem 1.5rem;border-radius:2rem;font-weight:bold">Siguiente</button>`;
                overlay.appendChild(box);
                document.body.appendChild(overlay);
                box.querySelector('button').onclick = () => { overlay.remove(); res(); };
            });
            await msg(`¡Hola mi amor! 💕 Algunas cartas esconden retos secretos: agitar el celular o rascar la pantalla.`);
            await msg(`No sabrás cuáles son hasta que las toques. ¡Cada día puedes abrir una carta!`);
            await msg(`¿Lista para la emoción? ¡Toca una carta y descubre la magia! ✨`);
            gameReady = true;
            localStorage.setItem('tutorial_v12', 'true');
            globalMsg.innerText = "💎 ¡Toca una carta y vive la sorpresa! 💎";
        }

        function init() {
            loadGame();
            rebuildUI();
            if(!localStorage.getItem('tutorial_v12')) startTutorial();
            else gameReady = true;
            
            resetBtn.onclick = () => { if(confirm('¿Reiniciar todo?')) resetGame(); };
            modal.onclick = (e) => { if(e.target === modal) closeModal(); };
            closeModalBtn.onclick = closeModal;
            document.body.addEventListener('touchstart', () => sounds.init(), { once: true });
        }

        init();
    })();
</script>
