<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>DailyGift-CO
</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --rosa: #FF69B4;
            --dorado: #FFD700;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            background: #0f0715;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: linear-gradient(145deg, #0f0715 0%, #1e1028 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 40%, rgba(255,105,180,0.12) 0%, transparent 70%),
                        radial-gradient(circle at 80% 60%, rgba(255,215,0,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            max-width: 1100px;
            width: 100%;
            height: 100%;
            max-height: 100vh;
            background: rgba(20, 8, 25, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,105,180,0.3);
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 0.5rem;
            flex-shrink: 0;
        }

        .title {
            font-size: clamp(1.2rem, 6vw, 1.9rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FF69B4, #FFB6C1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,105,180,0.5);
            animation: titleGlow 2s infinite;
            will-change: filter;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255,105,180,0.3)); }
            50% { filter: drop-shadow(0 0 15px rgba(255,215,0,0.5)); }
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 0.4rem 1rem;
            margin: 0.5rem 0;
            gap: 8px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,105,180,0.4);
            flex-shrink: 0;
        }

        .progress {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            padding: 0.25rem 1rem;
            border-radius: 40px;
            font-weight: bold;
            color: #1a0a1a;
            font-size: 0.85rem;
            box-shadow: 0 0 10px rgba(255,105,180,0.5);
        }

        .daily {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #FFE4F0;
            font-weight: 600;
        }

        .reset-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #FFB6C1;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.75rem;
            color: #FFE4F0;
            cursor: pointer;
            transition: transform 0.1s, background 0.1s;
            will-change: transform;
        }
        .reset-btn:active { transform: scale(0.96); background: #FF69B4; color: #1a0a1a; }

        .cards-scroll-area {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            margin: 0.5rem 0;
            padding: 0 4px;
            -webkit-overflow-scrolling: touch;
        }

        .cards-scroll-area::-webkit-scrollbar { width: 5px; }
        .cards-scroll-area::-webkit-scrollbar-thumb { background: #FF69B4; border-radius: 10px; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 0.7rem;
            padding-bottom: 0.5rem;
        }

        .card-container {
            aspect-ratio: 3 / 4;
            perspective: 800px;
            cursor: pointer;
            will-change: transform;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 1rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            will-change: transform, box-shadow;
        }

        .card.flipping {
            animation: flipCelebration 1.4s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes flipCelebration {
            0% { transform: rotateY(0deg); box-shadow: 0 0 0 2px rgba(255,215,0,0.8); }
            30% { transform: rotateY(90deg); box-shadow: 0 0 20px 8px rgba(255,215,0,0.9); }
            60% { transform: rotateY(180deg); box-shadow: 0 0 30px 12px #FF69B4; }
            100% { transform: rotateY(180deg); box-shadow: 0 6px 14px rgba(0,0,0,0.3); }
        }

        .card.flipped-permanent { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(145deg, #2d1b36, #1a0a1a);
            border: 2px solid #FF69B4;
            box-shadow: inset 0 0 20px rgba(255,20,147,0.3);
        }

        .card-back-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px #FF69B4);
            animation: heartbeat 1.2s infinite;
            will-change: transform;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.12); opacity: 1; }
        }

        .card-front {
            background: linear-gradient(145deg, #FFF0F8, #FFE0F0);
            transform: rotateY(180deg);
            border: 1px solid #FFD700;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.9rem;
        }

        .card-text {
            font-size: clamp(0.65rem, 3vw, 0.85rem);
            font-weight: 800;
            text-align: center;
            color: #4a0a2a;
            background: rgba(255,240,248,0.95);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            word-break: break-word;
            border-radius: 0.9rem;
        }

        .footer-area {
            flex-shrink: 0;
            margin-top: 0.3rem;
        }

        .msg-area {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 1rem;
            padding: 0.7rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: #FFE4F0;
            border: 1px solid rgba(255,105,180,0.4);
        }

        footer {
            font-size: 0.65rem;
            text-align: center;
            margin-top: 0.4rem;
            opacity: 0.7;
            color: #FFE4F0;
        }

        /* Modal optimizado */
        .modal-full {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(25px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: linear-gradient(145deg, #2d1b36, #1a0a1a);
            max-width: 85vw;
            max-height: 80vh;
            border-radius: 2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid #FFD700;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: modalMagic 0.3s ease-out;
            will-change: transform, opacity;
        }

        @keyframes modalMagic {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-img {
            max-width: 100%;
            max-height: 55vh;
            object-fit: contain;
            border-radius: 1rem;
        }

        .modal-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFF0F5;
            padding: 1rem;
            text-align: center;
        }

        .close-modal {
            margin-top: 0.8rem;
            background: linear-gradient(135deg, #FF69B4, #FFD700);
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #1a0a1a;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .close-modal:active { transform: scale(0.96); }

        /* Minijuegos overlay (sin lag) */
        .minigame-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20,8,25,0.95);
            backdrop-filter: blur(20px);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .minigame-card {
            background: linear-gradient(145deg, #2d1b36, #1a0a1a);
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            padding: 1.8rem 1.2rem;
            border: 3px solid #FFD700;
            box-shadow: 0 0 40px #FF69B4;
            text-align: center;
            color: #FFE4F0;
        }

        .minigame-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FFD700, #FF69B4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .shake-bar-container {
            background: #1a0a1a;
            height: 30px;
            border-radius: 40px;
            margin: 20px 0;
            border: 2px solid #FF69B4;
            overflow: hidden;
        }

        .shake-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FF69B4);
            transition: width 0.05s linear;
            box-shadow: 0 0 15px #FF69B4;
            will-change: width;
        }

        .scratch-canvas-container {
            margin: 15px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 0 3px #FFD700;
        }

        #scratchCanvas {
            display: block;
            width: 100%;
            aspect-ratio: 1/1;
            background: #2d1b36;
            touch-action: none;
            will-change: contents;
        }

        .timer-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #FFD700;
            margin: 8px 0;
        }

        .btn-minigame {
            background: linear-gradient(135deg, #FF69B4, #FFD700);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #1a0a1a;
            font-size: 1.1rem;
            margin-top: 10px;
            cursor: pointer;
            border: 1px solid white;
        }
        .btn-minigame.cancel {
            background: #3a2a3a;
            color: #FFE4F0;
            margin-left: 10px;
        }

        /* Confeti ligero (GPU) */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #FF69B4;
            pointer-events: none;
            z-index: 4000;
            will-change: transform, opacity;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 650px) {
            body { padding: 6px; }
            .game-container { padding: 0.8rem; border-radius: 1.5rem; }
            .cards-grid { grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header"><div class="title">DailyGift
 ✨</div></div>
    <div class="stats">
        <div class="progress">🎀 <span id="progressCount">0</span>/<span id="totalCardsSpan">20</span></div>
        <div class="daily"> <span id="dailyMsg">Solo una carta disponible ✨</span></div>
        
    </div>
    <div class="cards-scroll-area" id="scrollArea">
        <div class="cards-grid" id="cardsGrid"></div>
    </div>
    <div class="footer-area">
        <div class="msg-area" id="globalMsg">💗 Toca una carta… algunas esconden retos secretos 💗</div>
        <footer>💌 Con todo mi amor, <span id="nombreNovioFooter">Yeffer Hurtado</span> 💌</footer>
    </div>
</div>

<!-- Modal -->
<div id="fullModal" class="modal-full">
    <div class="modal-card">
        <div id="modalContent"></div>
        <button class="close-modal" id="closeModalBtn">Cerrar</button>
    </div>
</div>

<!-- Overlay minijuegos -->
<div id="minigameOverlay" class="minigame-overlay" style="display: none;"></div>

<script>
    (function(){
        "use strict";

        // CONFIG
        const CONFIG = {
            NOVIA: "Hellen",
            NOVIO: "Yeffer Hurtado",
            TOTAL_CARTAS: 20,
            NUM_ROMANTICAS: 8, NUM_PICANTES: 4, NUM_FOTOS: 8
        };

        // CONTENIDOS
        const ROMANTICAS = [
            { t:"text", v:`${CONFIG.NOVIA}, eres el amor de mi vida 💕` },{ t:"text", v:"Vale por un masaje relajante de 30 min 💆‍♀️" },
            { t:"text", v:`Cada día te amo más, eres mi sol 🌞` },{ t:"text", v:"Te amo hasta el infinito y más allá 💖" },
            { t:"text", v:"Pídeme la foto que quieras, hoy es tu día 📸" },{ t:"text", v:"Tu sonrisa ilumina mi mundo ☀️" },
            { t:"text", v:"Esta noche elegimos juntos la película 🎬" },{ t:"text", v:"Desayuno sorpresa en la cama 🥐" }
        ];
        const PICANTES = [
            { t:"text", v:"🔥 Quiero una foto tuya ahora mismo 🔥" },{ t:"text", v:"💪 20 sentadillas en video para mí" },
            { t:"text", v:"👑 Hoy tú mandas en todo" },{ t:"text", v:"💃 Te debo un baile privado" },
            { t:"text", v:"🏩 Próxima cita: tú eliges el lugar" },{ t:"text", v:"🎤 Mándame un audio diciendo algo lindo" }
        ];
        const FOTOS = [
            { t:"img", v:"https://picsum.photos/400/600?random=301" },{ t:"img", v:"https://picsum.photos/400/600?random=302" },
            { t:"img", v:"https://picsum.photos/400/600?random=303" },{ t:"img", v:"https://picsum.photos/400/600?random=304" },
            { t:"img", v:"https://picsum.photos/400/600?random=305" },{ t:"img", v:"https://picsum.photos/400/600?random=306" },
            { t:"img", v:"https://picsum.photos/400/600?random=307" },{ t:"img", v:"https://picsum.photos/400/600?random=308" }
        ];

        // Estado
        let currentCards = [], unlocked = [], lastDate = null, specialMechanics = {};
        let gameReady = false, isAnimating = false, activeMinigame = false;
        let cardElements = [];

        // DOM
        const grid = document.getElementById('cardsGrid');
        const progressSpan = document.getElementById('progressCount');
        const dailySpan = document.getElementById('dailyMsg');
        const globalMsg = document.getElementById('globalMsg');
        const modal = document.getElementById('fullModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const resetBtn = document.getElementById('resetGameBtn');
        const minigameOverlay = document.getElementById('minigameOverlay');

        document.getElementById('totalCardsSpan').innerText = CONFIG.TOTAL_CARTAS;
        document.getElementById('nombreNovioFooter').innerText = CONFIG.NOVIO;

        // Utilidades fecha
        const getTodayStr = () => { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };
        const allUnlocked = () => unlocked.every(v=>v===true);
        const canUnlock = () => lastDate !== getTodayStr() && !allUnlocked();

        // Sonidos (bajo consumo)
        const sounds = { ctx:null, init(){ if(!this.ctx && window.AudioContext) this.ctx = new AudioContext(); },
            play(f,d=0.25){ this.init(); if(!this.ctx) return; if(this.ctx.state==='suspended') this.ctx.resume();
                try{ const n=this.ctx.currentTime; f.forEach((fr,i)=>{ const o=this.ctx.createOscillator(); const g=this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination); o.type='sine'; o.frequency.value=fr;
                    g.gain.setValueAtTime(0.06, n+i*0.04); g.gain.exponentialRampToValueAtTime(0.0001, n+i*0.04+d);
                    o.start(n+i*0.04); o.stop(n+i*0.04+d); }); }catch(e){} } };

        // Confeti ligero (solo 15 partículas)
        function spawnConfetti() {
            for(let i=0; i<15; i++) {
                const c = document.createElement('div'); c.className='confetti';
                c.style.left = Math.random()*100+'%'; c.style.background = ['#FF69B4','#FFD700','#FFB6C1'][Math.floor(Math.random()*3)];
                c.style.animationDuration = (Math.random()*1.2+0.8)+'s'; c.style.animationDelay = Math.random()*0.2+'s';
                document.body.appendChild(c); setTimeout(()=>c.remove(), 2000);
            }
        }

        // Barajar
        function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

        function buildDeck(){
            let deck = [];
            deck.push(...shuffle([...ROMANTICAS]).slice(0, CONFIG.NUM_ROMANTICAS));
            deck.push(...shuffle([...PICANTES]).slice(0, CONFIG.NUM_PICANTES));
            deck.push(...shuffle([...FOTOS]).slice(0, CONFIG.NUM_FOTOS));
            while(deck.length < CONFIG.TOTAL_CARTAS) deck.push({ t:"text", v:`Te amo ${CONFIG.NOVIA} 💖` });
            deck = shuffle(deck).slice(0, CONFIG.TOTAL_CARTAS);
            const mech = {}; const specials = new Set(); while(specials.size<6) specials.add(Math.floor(Math.random()*CONFIG.TOTAL_CARTAS));
            ['shake','scratch','shake','scratch','shake','scratch'].forEach((m,i)=> mech[[...specials][i]] = m );
            return { deck, specialMechanics: mech };
        }

        // Persistencia
        function saveGame(){ localStorage.setItem('loveGame_opt', JSON.stringify({ d:currentCards, u:unlocked, ld:lastDate, s:specialMechanics })); }
        function loadGame(){
            const raw = localStorage.getItem('loveGame_opt');
            if(raw){ try{ const data=JSON.parse(raw); currentCards=data.d; unlocked=data.u; lastDate=data.ld; specialMechanics=data.s||{}; if(currentCards.length===CONFIG.TOTAL_CARTAS) return; }catch(e){} }
            const built = buildDeck(); currentCards=built.deck; specialMechanics=built.specialMechanics; unlocked=new Array(CONFIG.TOTAL_CARTAS).fill(false); lastDate=null; saveGame();
        }

        // UI de cartas (optimizado con fragment)
        function updateCardFrontElement(idx){
            const front = cardElements[idx].querySelector('.card-front'); front.innerHTML='';
            const data = currentCards[idx];
            if(data.t==='img'){ const img=document.createElement('img'); img.src=data.v; front.appendChild(img); }
            else{ const d=document.createElement('div'); d.className='card-text'; d.innerText=data.v; front.appendChild(d); }
        }

        function rebuildUI(){
            const fragment = document.createDocumentFragment();
            cardElements = [];
            for(let i=0; i<CONFIG.TOTAL_CARTAS; i++){
                const cont = document.createElement('div'); cont.className='card-container';
                const card = document.createElement('div'); card.className='card' + (unlocked[i]?' flipped-permanent':'');
                const front = document.createElement('div'); front.className='card-front';
                const back = document.createElement('div'); back.className='card-back'; back.innerHTML='<span class="card-back-icon">💖</span>';
                if(unlocked[i]){ updateCardFrontElement(i); } else { front.innerHTML='<span class="card-back-icon">💖</span>'; }
                card.appendChild(front); card.appendChild(back); cont.appendChild(card);
                cont.addEventListener('click', (idx=>()=>onCardClick(idx))(i));
                fragment.appendChild(cont);
                cardElements.push(card);
            }
            grid.innerHTML = ''; grid.appendChild(fragment);
            updateProgress();
        }

        function updateProgress(){
            const cnt = unlocked.filter(v=>v).length; progressSpan.innerText = cnt;
            if(allUnlocked()) dailySpan.innerText = "🏆 COMPLETADO";
            else if(lastDate === getTodayStr()) dailySpan.innerText = "⏳ Carta usada hoy";
            else dailySpan.innerText = "✨ 1 carta disponible ✨";
        }

        // Flujo principal
        async function onCardClick(index){
            if(!gameReady || isAnimating || activeMinigame) return;
            if(unlocked[index]){ showModal(index); return; }
            if(allUnlocked()){ globalMsg.innerText="🌟 ¡Ya descubriste todas las sorpresas! 🌟"; return; }
            if(!canUnlock()){ globalMsg.innerText="⏳ Solo una carta por día. ¡Mañana más! 💫"; sounds.play([880]); return; }

            const mech = specialMechanics[index];
            if(mech === 'shake') await startShakeGame(index);
            else if(mech === 'scratch') await startScratchGame(index);
            else await unlockNormal(index);
            if(unlocked[index]) finalizeUnlock(index);
        }

        async function unlockNormal(index){
            isAnimating=activeMinigame=true;
            const card = cardElements[index];
            sounds.play([880,1046]);
            card.classList.add('flipping');
            await new Promise(r=>setTimeout(r,1400));
            unlocked[index]=true; lastDate=getTodayStr(); saveGame();
            updateCardFrontElement(index);
            card.classList.remove('flipping'); card.classList.add('flipped-permanent');
            finalizeUnlock(index);
            isAnimating=activeMinigame=false;
        }

        function finalizeUnlock(index){
            spawnConfetti(); sounds.play([523,659,783]);
            updateProgress(); globalMsg.innerHTML='🎉✨ ¡CARTA DESBLOQUEADA! ✨🎉';
            if(navigator.vibrate) navigator.vibrate([100,50,100]);
        }

        // SHAKE optimizado (throttle con RAF)
        function startShakeGame(index){
            return new Promise(resolve=>{
                activeMinigame=isAnimating=true;
                let power=0; const TH=100; let last={x:0,y:0,z:0}; let raf=null, lastUpdate=0;
                minigameOverlay.style.display='flex';
                minigameOverlay.innerHTML=`<div class="minigame-card"><div class="minigame-title">⚡ ¡AGITA! ⚡</div><p>Agita el celular rápido</p><div class="shake-bar-container"><div id="shakeFill" class="shake-bar-fill" style="width:0%"></div></div><p id="shakeHint">¡Más rápido! 🔥</p><button class="btn-minigame cancel" id="cancelShake">Cancelar</button></div>`;
                const fill=document.getElementById('shakeFill'), hint=document.getElementById('shakeHint');
                const motionHandler = (e) => {
                    const acc = e.accelerationIncludingGravity; if(!acc) return;
                    const now = performance.now(); if(now - lastUpdate < 30) return; lastUpdate=now;
                    const delta = Math.abs(acc.x-last.x)+Math.abs(acc.y-last.y)+Math.abs(acc.z-last.z);
                    if(delta>15){ power=Math.min(power+delta*0.8, TH); fill.style.width=(power/TH*100)+'%'; if(power>=TH){ cleanup(); complete(); } }
                    last={x:acc.x, y:acc.y, z:acc.z};
                };
                const complete = ()=>{
                    minigameOverlay.style.display='none'; unlocked[index]=true; lastDate=getTodayStr(); saveGame();
                    updateCardFrontElement(index); cardElements[index].classList.add('flipped-permanent');
                    activeMinigame=isAnimating=false; resolve();
                };
                const cancel = ()=>{ cleanup(); minigameOverlay.style.display='none'; activeMinigame=isAnimating=false; globalMsg.innerText='😢 Intenta de nuevo'; resolve(); };
                const cleanup = ()=>{ window.removeEventListener('devicemotion', motionHandler); clearTimeout(timer); };
                const timer = setTimeout(()=>{ if(power<TH) cancel(); },15000);
                if(typeof DeviceMotionEvent?.requestPermission==='function'){ DeviceMotionEvent.requestPermission().then(p=>{ if(p==='granted') window.addEventListener('devicemotion', motionHandler); else cancel(); }).catch(cancel); }
                else{ window.addEventListener('devicemotion', motionHandler); }
                document.getElementById('cancelShake').onclick=cancel; minigameOverlay.onclick=e=>{ if(e.target===minigameOverlay) cancel(); };
            });
        }

        // SCRATCH (raspado eficiente)
        function startScratchGame(index){
            return new Promise(resolve=>{
                activeMinigame=isAnimating=true; const data=currentCards[index];
                minigameOverlay.style.display='flex';
                minigameOverlay.innerHTML=`<div class="minigame-card" style="max-width:450px"><div class="minigame-title">✨ RASCA ✨</div><p>Talla con el dedo</p><div class="scratch-canvas-container"><canvas id="scratchCanvas" width="400" height="400"></canvas></div><div class="timer-text" id="scratchTimer">15s</div><button class="btn-minigame cancel" id="cancelScratch">Cancelar</button></div>`;
                const canvas=document.getElementById('scratchCanvas'), ctx=canvas.getContext('2d', { alpha: true });
                const timerEl=document.getElementById('scratchTimer'); let time=15, revealed=false;
                const drawBase=()=>{
                    ctx.clearRect(0,0,400,400); ctx.fillStyle='#FFF0F5'; ctx.fillRect(0,0,400,400);
                    if(data.t==='img'){
                        const img=new Image(); img.crossOrigin='anonymous'; img.src=data.v;
                        img.onload=()=>{ ctx.drawImage(img,0,0,400,400); drawCover(); };
                        img.onerror=()=>{ ctx.font='bold 22px system-ui'; ctx.fillStyle='#4a0a2a'; ctx.textAlign='center'; ctx.fillText('🌸 Imagen 🌸',200,200); drawCover(); };
                    }else{ ctx.font='bold 22px system-ui'; ctx.fillStyle='#4a0a2a'; ctx.textAlign='center'; ctx.fillText(data.v,200,200); drawCover(); }
                };
                const drawCover=()=>{ ctx.fillStyle='#4a2e4a'; ctx.fillRect(0,0,400,400); ctx.fillStyle='#FFD700'; ctx.font='bold 20px system-ui'; ctx.fillText('✨ RASCA ✨',200,200); };
                const scratch=(x,y)=>{ ctx.save(); ctx.globalCompositeOperation='destination-out'; ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2); ctx.fill(); ctx.restore(); checkReveal(); };
                const checkReveal=()=>{ if(revealed) return; const imgData=ctx.getImageData(0,0,400,400); let cnt=0; for(let i=0;i<imgData.data.length;i+=4) if(imgData.data[i+3]<200) cnt++; if(cnt>60000){ revealed=true; finish(true); } };
                const finish=(success)=>{
                    clearInterval(timerInt); canvas.removeEventListener('touchmove', touchMove); canvas.removeEventListener('touchstart', touchStart);
                    canvas.removeEventListener('mousemove', mouseMove); canvas.removeEventListener('mousedown', mouseDown);
                    if(success){ unlocked[index]=true; lastDate=getTodayStr(); saveGame(); updateCardFrontElement(index); cardElements[index].classList.add('flipped-permanent'); }
                    minigameOverlay.style.display='none'; activeMinigame=isAnimating=false; resolve();
                };
                const getCoords=e=>{ const r=canvas.getBoundingClientRect(); const s=400/r.width; let cx,cy; if(e.touches){ cx=e.touches[0].clientX; cy=e.touches[0].clientY; } else { cx=e.clientX; cy=e.clientY; } return { x:Math.min(400,Math.max(0,(cx-r.left)*s)), y:Math.min(400,Math.max(0,(cy-r.top)*s)) }; };
                const touchStart=e=>{ e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                const touchMove=e=>{ e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                const mouseDown=e=>{ e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                const mouseMove=e=>{ if(e.buttons!==1) return; e.preventDefault(); const {x,y}=getCoords(e); scratch(x,y); };
                drawBase();
                canvas.addEventListener('touchstart', touchStart, {passive:false}); canvas.addEventListener('touchmove', touchMove, {passive:false});
                canvas.addEventListener('mousedown', mouseDown); canvas.addEventListener('mousemove', mouseMove);
                const timerInt = setInterval(()=>{ time--; timerEl.textContent=time+'s'; if(time<=0) finish(false); },1000);
                document.getElementById('cancelScratch').onclick=()=>finish(false);
                minigameOverlay.onclick=e=>{ if(e.target===minigameOverlay) finish(false); };
            });
        }

        function showModal(idx){
            const data=currentCards[idx]; modalContent.innerHTML='';
            if(data.t==='img'){ const img=document.createElement('img'); img.className='modal-img'; img.src=data.v; modalContent.appendChild(img); }
            else{ const d=document.createElement('div'); d.className='modal-text'; d.innerText=data.v; modalContent.appendChild(d); }
            modal.style.display='flex'; sounds.play([880]);
        }
        function closeModal(){ modal.style.display='none'; }

        function resetGame(){
            if(isAnimating) return; const built=buildDeck(); currentCards=built.deck; specialMechanics=built.specialMechanics;
            unlocked=new Array(CONFIG.TOTAL_CARTAS).fill(false); lastDate=null; saveGame(); rebuildUI();
            globalMsg.innerText="✨ Juego reiniciado. ¡Descubre las cartas secretas! ✨";
        }

        async function tutorial(){
            gameReady=false; const msg=t=>new Promise(r=>{ const o=document.createElement('div'); o.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center';
                const b=document.createElement('div'); b.style.cssText='background:#2d1b36;padding:2rem;border-radius:2rem;border:3px solid #FFD700;max-width:320px;text-align:center';
                b.innerHTML=`<p style="color:#FFE4F0;margin-bottom:1rem">💖 ${t}</p><button style="background:#FF69B4;border:none;padding:0.6rem 1.5rem;border-radius:2rem;">Siguiente</button>`; o.appendChild(b); document.body.appendChild(o);
                b.querySelector('button').onclick=()=>{ o.remove(); r(); }; });
            await msg(`¡Hola mi amor! 💕 Algunas cartas esconden retos secretos: agitar el celular o rascar la pantalla.`);
            await msg(`No sabrás cuáles son hasta que las toques. ¡Cada día puedes abrir una carta!`);
            await msg(`¿Lista para la emoción? ¡Toca una carta y descubre la magia! ✨`);
            gameReady=true; localStorage.setItem('tutorial_opt','1'); globalMsg.innerText="💎 ¡Toca una carta y vive la sorpresa! 💎";
        }

        function init(){
            loadGame(); rebuildUI();
            if(!localStorage.getItem('tutorial_opt')) tutorial(); else gameReady=true;
            resetBtn.onclick=()=>{ if(confirm('¿Reiniciar todo?')) resetGame(); };
            modal.onclick=e=>{ if(e.target===modal) closeModal(); }; closeModalBtn.onclick=closeModal;
            document.body.addEventListener('touchstart', ()=>sounds.init(), {once:true});
        }
        init();
    })();
</script>
